<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CashEmpireBot</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;display:flex;align-items:center;justify-content:center;color:#fff;overflow:hidden}
.particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.p{position:absolute;width:6px;height:6px;background:rgba(255,215,0,.3);border-radius:50%;animation:float linear infinite}
@keyframes float{0%{transform:translateY(100vh) rotate(0deg);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-10vh) rotate(720deg);opacity:0}}
.card{position:relative;z-index:1;background:rgba(255,255,255,.06);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.1);border-radius:28px;padding:52px 60px;text-align:center;max-width:500px;width:90%;box-shadow:0 30px 60px rgba(0,0,0,.5)}
.coin{font-size:72px;margin-bottom:8px;display:inline-block;animation:bounce 2s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
h1{font-size:30px;font-weight:800;margin-bottom:4px;background:linear-gradient(90deg,#f7971e,#ffd200);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{color:rgba(255,255,255,.45);font-size:14px;margin-bottom:24px;letter-spacing:.5px}
.badge{display:inline-flex;align-items:center;gap:8px;background:rgba(46,204,113,.12);border:1px solid rgba(46,204,113,.25);color:#2ecc71;padding:10px 22px;border-radius:40px;font-size:13px;font-weight:700;margin-bottom:24px;letter-spacing:.5px}
.dot{width:10px;height:10px;border-radius:50%;background:#2ecc71;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(46,204,113,.6)}50%{box-shadow:0 0 0 8px rgba(46,204,113,0)}}
.stats{display:flex;gap:36px;justify-content:center;margin:20px 0 12px}
.stat{text-align:center}
.num{font-size:24px;font-weight:800;color:#ffd200}
.lbl{font-size:10px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:1.5px;margin-top:2px}
.typing{display:inline-block;overflow:hidden;border-right:2px solid #ffd200;white-space:nowrap;animation:typing 3s steps(20) infinite alternate,blink .7s step-end infinite;font-size:13px;color:rgba(255,255,255,.5);margin-top:16px}
@keyframes typing{from{width:0}to{width:180px}50%{width:180px}to{width:0}}
@keyframes blink{50%{border-color:transparent}}
.footer{font-size:11px;color:rgba(255,255,255,.18);margin-top:22px;letter-spacing:.5px}
</style>
</head>
<body>
<div class="particles" id="particles"></div>
<div class="card">
  <div class="coin">🪙</div>
  <h1>CashEmpireBot</h1>
  <p class="sub">Empire Tycoon · Discord Bot</p>
  <div class="badge"><span class="dot"></span> ONLINE</div>
  <div class="stats">
    <div class="stat"><div class="num">24/7</div><div class="lbl">Uptime</div></div>
    <div class="stat"><div class="num">⚡</div><div class="lbl">Status</div></div>
    <div class="stat"><div class="num">∞</div><div class="lbl">Empire</div></div>
  </div>
  <div class="typing">/work · /daily · /petshop</div>
  <p style="font-size:12px;color:rgba(255,255,255,.28);margin-top:18px">Ready to grow your empire</p>
  <div class="footer">Replit · 2026</div>
</div>
<script>
for(let i=0;i<40;i++){let p=document.createElement('div');p.className='p';p.style.left=Math.random()*100+'%';p.style.animationDuration=(6+Math.random()*10)+'s';p.style.animationDelay=Math.random()*10+'s';p.style.width=p.style.height=(3+Math.random()*6)+'px';document.getElementById('particles').appendChild(p)}
</script>
</body>
</html>
